#
# One-command self-hosting: `docker compose up`.
# Brings up Postgres + Redis + api (with in-process worker) + a scalable worker
# + the web UI. The api applies migrations and seeds a default admin on first run.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo
      POSTGRES_DB: tempo_flow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://tempo:tempo@postgres:5432/tempo_flow?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      SEED_ON_START: "true"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@tempo-flow.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin1234}
      WORKER_ENABLED: "true"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      # Tracing is off unless an OTLP endpoint is set (e.g. http://jaeger:4318).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tempo-flow-api}
      PORT: "3000"
    ports:
      - "3000:3000"
    # Inline-script nodes run as isolated containers via the host Docker daemon.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://tempo:tempo@postgres:5432/tempo_flow?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      # Worker replicas don't run migrations/seed; the api does.
      RUN_MIGRATIONS: "false"
      WORKER_ENABLED: "true"
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tempo-flow-worker}
      PORT: "3001"
    # Inline-script nodes run as isolated containers via the host Docker daemon.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

  # Optional tracing backend: `docker compose --profile observability up jaeger`
  # then set OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318 on api/worker.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4318:4318" # OTLP HTTP

volumes:
  pgdata:
