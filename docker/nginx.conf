server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API + health to the api service.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location /health {
    proxy_pass http://api:3000;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
